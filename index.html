<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Mitra & Kunjungan Kerjasama</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-app-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-firestore-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap');

  :root{
    --bg: #0a0d12;
    --surface: rgba(21,27,35,0.78);
    --surface-solid: #151b23;
    --surface-2: #1b232d;
    --border: #262f3b;
    --border-soft: rgba(255,255,255,0.06);
    --text: #e9ecf1;
    --text-dim: #8b96a3;
    --text-faint: #5a6472;
    --gold: #d8a755;
    --gold-soft: rgba(216,167,85,0.14);
    --blue: #5b8def;
    --blue-soft: rgba(91,141,239,0.14);
    --green: #4fd185;
    --green-soft: rgba(79,209,133,0.14);
    --amber: #f0a93b;
    --amber-soft: rgba(240,169,59,0.14);
    --slate: #8a96a5;
    --slate-soft: rgba(138,150,165,0.14);
    --red: #f1716b;
    --radius-lg: 18px;
    --radius: 13px;
    --radius-sm: 9px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  *:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}

  body{
    background:
      radial-gradient(circle at 8% -10%, rgba(216,167,85,0.10) 0%, transparent 45%),
      radial-gradient(circle at 100% 10%, rgba(91,141,239,0.08) 0%, transparent 40%),
      var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    padding: 32px 28px 60px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap{max-width: 1260px; margin: 0 auto;}

  /* ---------- Header ---------- */
  header{
    display:flex; justify-content:space-between; align-items:flex-start;
    flex-wrap: wrap; gap:16px;
    margin-bottom: 26px;
  }
  .eyebrow{
    font-family:'Plus Jakarta Sans'; font-size:11px; letter-spacing:.16em;
    text-transform:uppercase; color: var(--gold); font-weight:700; margin-bottom:8px;
    display:flex; align-items:center; gap:8px;
  }
  .eyebrow::before{content:''; width:14px; height:1px; background: var(--gold); display:inline-block;}
  h1{
    font-family:'Plus Jakarta Sans'; font-weight:800; font-size: 27px; letter-spacing:-0.015em;
  }
  .sub{color: var(--text-dim); font-size: 13px; margin-top:5px;}

  .header-actions{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}

  .btn-ghost{
    display:flex; align-items:center; gap:7px; font-family:'Plus Jakarta Sans'; font-weight:600;
    font-size:12.5px; padding:9px 14px; border:1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface-solid); color: var(--text); cursor:pointer; transition: all .15s ease;
  }
  .btn-ghost:hover{border-color: var(--gold); color: var(--gold);}
  .btn-ghost svg{width:15px; height:15px; flex-shrink:0;}

  .live-tag{
    display:flex; align-items:center; gap:8px; font-size:12px; color: var(--text-dim);
    background: var(--surface-solid); border:1px solid var(--border); border-radius: 999px;
    padding: 8px 14px 8px 12px; font-family:'Plus Jakarta Sans'; font-weight:600;
  }
  .dot{width:7px;height:7px;border-radius:50%; background: var(--green);}
  .dot.local{background: var(--amber);}
  .dot.pulse{animation: pulse 1s ease-out;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(79,209,133,0.55);}
    100%{box-shadow:0 0 0 10px rgba(79,209,133,0);}
  }

  /* ---------- Stat cards ---------- */
  .stats{display:grid; grid-template-columns: repeat(5, 1fr); gap:14px; margin-bottom: 22px;}
  .stat-card{
    background: var(--surface); backdrop-filter: blur(10px); border:1px solid var(--border-soft);
    border-radius: var(--radius); padding: 18px; transition: transform .18s ease, border-color .18s ease;
  }
  .stat-card:hover{transform: translateY(-3px); border-color: var(--accent, var(--gold));}
  .stat-icon{
    width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    background: var(--accent-soft, var(--gold-soft)); color: var(--accent, var(--gold)); margin-bottom:14px;
  }
  .stat-icon svg{width:17px; height:17px;}
  .stat-label{font-size:11.5px; color:var(--text-dim); font-weight:600; text-transform:uppercase; letter-spacing:.05em;}
  .stat-value{font-family:'JetBrains Mono'; font-size: 27px; font-weight:600; margin-top:6px; color:var(--text);}
  .stat-card.aktif{--accent: var(--green); --accent-soft: var(--green-soft);}
  .stat-card.proses{--accent: var(--amber); --accent-soft: var(--amber-soft);}
  .stat-card.selesai{--accent: var(--slate); --accent-soft: var(--slate-soft);}
  .stat-card.mitra{--accent: var(--gold); --accent-soft: var(--gold-soft);}
  .stat-card.kunjungan{--accent: var(--blue); --accent-soft: var(--blue-soft);}

  /* ---------- Layout ---------- */
  .grid{display:grid; grid-template-columns: 340px 1fr; gap: 16px; margin-bottom: 16px;}
  .panel{
    background: var(--surface); backdrop-filter: blur(10px); border:1px solid var(--border-soft);
    border-radius: var(--radius-lg); padding: 22px;
  }
  .panel h2{
    font-family:'Plus Jakarta Sans'; font-size:15px; font-weight:700; margin-bottom:16px;
    display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
  }
  .tag{
    font-size:10.5px; font-weight:700; letter-spacing:.05em; color: var(--gold);
    background: var(--gold-soft); padding:3px 9px; border-radius:6px; text-transform:uppercase;
  }

  /* ---------- Form ---------- */
  label{display:block; font-size:12px; color:var(--text-dim); font-weight:600; margin-bottom:6px; margin-top:14px;}
  label:first-of-type{margin-top:0;}
  input, select, textarea{
    width:100%; background: var(--surface-2); border:1px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 12px; color: var(--text); font-family:'Inter'; font-size:13.5px; transition: border-color .15s;
  }
  input::placeholder, textarea::placeholder{color: var(--text-faint);}
  input:focus, select:focus, textarea:focus{outline:none; border-color: var(--gold);}
  textarea{resize:vertical; min-height:56px; font-family:'Inter';}

  .btn-add{
    margin-top:18px; width:100%; background: linear-gradient(135deg, var(--gold), #c2924a); color:#1c1306; border:none;
    font-family:'Plus Jakarta Sans'; font-weight:700; font-size:13.5px; padding:12px;
    border-radius: var(--radius-sm); cursor:pointer; transition: filter .15s, transform .1s;
    display:flex; align-items:center; justify-content:center; gap:7px;
  }
  .btn-add:hover{filter:brightness(1.08);}
  .btn-add:active{transform: scale(0.98);}
  .btn-add svg{width:15px; height:15px;}

  .form-msg{font-size:12px; margin-top:10px; min-height:14px; color:#f87171;}

  /* ---------- Toggle / filter pills ---------- */
  .pill-group{display:flex; gap:5px; background: var(--surface-2); border-radius:9px; padding:3px; flex-wrap:wrap;}
  .pill-btn{
    font-family:'Plus Jakarta Sans'; font-size:11.5px; font-weight:700; padding:6px 12px;
    border-radius:7px; border:none; background:transparent; color:var(--text-dim); cursor:pointer; transition: all .15s;
  }
  .pill-btn.active{background: var(--gold); color:#1c1306;}
  .pill-btn:not(.active):hover{color: var(--text);}

  /* ---------- Chart ---------- */
  .chart-box{height: 270px; position:relative;}
  .chart-empty{display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-dim); font-size:13px; gap:10px;}
  .chart-empty svg{width:32px; height:32px; opacity:.5;}

  /* ---------- Table toolbar ---------- */
  .table-toolbar{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; align-items:center; justify-content:space-between;}
  .search-wrap{position:relative; flex:1; min-width:200px; max-width:300px;}
  .search-wrap svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--text-faint); pointer-events:none;}
  .search-wrap input{padding-left:32px;}

  /* ---------- Table ---------- */
  .table-scroll{max-height: 460px; overflow-y:auto; border-radius: var(--radius-sm);}
  .table-scroll::-webkit-scrollbar{width:7px;}
  .table-scroll::-webkit-scrollbar-thumb{background: var(--border); border-radius:10px;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  thead th{
    position: sticky; top:0; background: var(--surface-solid);
    text-align:left; font-family:'Plus Jakarta Sans'; font-size:10.5px; text-transform:uppercase;
    letter-spacing:.05em; color:var(--text-dim); font-weight:700; padding:11px 12px; border-bottom:1px solid var(--border); z-index:1;
  }
  tbody td{padding:12px; border-bottom:1px solid var(--border-soft); vertical-align:top; color: var(--text);}
  tbody tr{animation: fadeIn .35s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:translateY(0);}}
  tbody tr:hover{background: rgba(255,255,255,0.025);}
  .note-cell{color:var(--text-dim); font-size:12px; max-width:200px;}
  .inst-cell{font-weight:600;}

  .badge{
    display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px;
    font-family:'Plus Jakarta Sans';
  }
  .badge::before{content:''; width:6px; height:6px; border-radius:50%; background: currentColor;}
  .badge.aktif{background: var(--green-soft); color: var(--green);}
  .badge.proses{background: var(--amber-soft); color: var(--amber);}
  .badge.selesai{background: var(--slate-soft); color: var(--slate);}

  .btn-del{
    background:transparent; border:1px solid var(--border); color: var(--red); border-radius:7px;
    padding:6px 9px; font-size:12px; cursor:pointer; font-family:'Inter'; font-weight:600;
    display:flex; align-items:center; gap:5px; transition: all .15s;
  }
  .btn-del:hover{background: rgba(241,113,107,0.1); border-color: var(--red);}
  .btn-del svg{width:13px; height:13px;}

  .empty-state{padding: 46px 0; text-align:center; color:var(--text-dim); font-size:13px; display:flex; flex-direction:column; align-items:center; gap:10px;}
  .empty-state svg{width:30px; height:30px; opacity:.4;}
  .loading{text-align:center; padding:80px 0; color:var(--text-dim); font-size:13px;}

  /* ---------- Toast ---------- */
  #toastContainer{position:fixed; bottom:22px; right:22px; display:flex; flex-direction:column; gap:10px; z-index:50;}
  .toast{
    background: var(--surface-solid); border:1px solid var(--border); border-left:3px solid var(--green);
    border-radius: var(--radius-sm); padding: 12px 16px; font-size:13px; font-family:'Inter'; color:var(--text);
    box-shadow: 0 10px 30px rgba(0,0,0,0.35); opacity:0; transform: translateX(20px); transition: all .25s ease;
    max-width:280px;
  }
  .toast.error{border-left-color: var(--red);}
  .toast.show{opacity:1; transform: translateX(0);}

  @media (max-width: 980px){
    .stats{grid-template-columns: repeat(2,1fr);}
    .grid{grid-template-columns: 1fr;}
  }
  @media (max-width: 560px){
    body{padding:20px 14px 50px;}
    .stats{grid-template-columns: 1fr 1fr;}
    header{flex-direction:column;}
  }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading" id="loadingMsg">Memuat data mitra…</div>
</div>
<div id="toastContainer"></div>

<script>
const STORAGE_KEY = 'mitra-kunjungan-records';

// ============================================================
// KONFIGURASI SINKRONISASI CLOUD (FIREBASE) — OPSIONAL
// Isi 6 nilai di bawah ini dengan kredensial dari project Firebase
// Anda sendiri (gratis) agar data otomatis sinkron di perangkat manapun
// yang membuka file HTML ini. Cara mendapatkannya ada di pesan chat.
// Jika dibiarkan kosong, dashboard otomatis memakai penyimpanan lokal
// (tidak sinkron antar perangkat, tapi tetap berfungsi normal).
// ============================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCvjW_UJuml07Zt-2mZ4f6JgfihUsRJUMQ",
  authDomain: "mitra-adim-tour.firebaseapp.com",
  projectId: "mitra-adim-tour",
  storageBucket: "mitra-adim-tour.firebasestorage.app",
  messagingSenderId: "54813146686",
  appId: "1:54813146686:web:f7c9abae8f962064b65b6f"
};
const SYNC_DOC_ID = "adims-trans-mitra"; // boleh diganti bebas, hanya sebagai nama dokumen

const cloudEnabled = !!(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.projectId);
let docRef = null;
let unsubscribeSnapshot = null;

let records = [];
let chartMode = 'instansi';
let statusFilter = 'semua';
let searchQuery = '';
let chartInstance = null;
let prevStatValues = {mitra:0, total:0, aktif:0, proses:0, selesai:0};

const JENIS_OPTIONS = [
  'Kontrak Perjalanan Dinas',
  'Paket Wisata Korporat / Gathering',
  'Sewa Armada & Transportasi',
  'Kerjasama Reseller / Agen Tiket',
  'Kerjasama Hotel & Akomodasi',
  'Supplier Paket Wisata',
  'Sponsorship Acara / Event',
  'Lainnya'
];

const ICON = {
  building: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V5a1 1 0 0 1 1-1h7a1 1 0 0 1 1 1v16"/><path d="M13 21V9a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v12"/><path d="M9 9h0M9 13h0M9 17h0M17 13h0M17 17h0"/><path d="M2 21h20"/></svg>`,
  calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/><path d="m9 14 2 2 4-4"/></svg>`,
  check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.3 2.3L15.5 9.5"/></svg>`,
  clock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>`,
  archive: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="5" rx="1"/><path d="M5 9v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9"/><path d="M10 13h4"/></svg>`,
  download: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 11 5 5 5-5"/><path d="M5 21h14"/></svg>`,
  upload: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V9"/><path d="m7 13 5-5 5 5"/><path d="M5 21h14"/></svg>`,
  trash: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M10 11v6M14 11v6"/><path d="M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/><path d="M9 7V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3"/></svg>`,
  search: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>`,
  plus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`,
  inbox: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h4l2 3h4l2-3h4"/><path d="M5.5 6 4 12v6a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-6l-1.5-6a1 1 0 0 0-1-.7H6.5a1 1 0 0 0-1 .7Z"/></svg>`,
};

function escapeHtml(str){
  const d = document.createElement('div');
  d.innerText = str;
  return d.innerHTML;
}
function fmtDate(iso){
  if(!iso) return '-';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric'});
}
function monthLabel(iso){
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('id-ID', {month:'short', year:'numeric'});
}

/* ---------- Cloud sync (Firestore) ---------- */
function initCloudSync(onFirstData){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.firestore();
    docRef = db.collection('dashboards').doc(SYNC_DOC_ID);
    let first = true;
    unsubscribeSnapshot = docRef.onSnapshot(snap => {
      const data = snap.exists ? snap.data() : null;
      records = (data && Array.isArray(data.records)) ? data.records : [];
      if(first){ first = false; onFirstData(); }
      else { renderApp(); pulseLive(); }
    }, err => {
      console.error('Cloud sync error', err);
      showToast('Gagal terhubung ke cloud sync. Periksa konfigurasi Firebase.', 'error');
      if(first){ first = false; loadRecords().then(onFirstData); }
    });
    return true;
  }catch(e){
    console.error('Gagal inisialisasi cloud sync', e);
    return false;
  }
}

/* ---------- Storage: cloud (Firestore) > Claude.ai storage > localStorage fallback ---------- */
async function loadRecords(){
  try{
    if(window.storage){
      const res = await window.storage.get(STORAGE_KEY, false);
      records = res ? JSON.parse(res.value) : [];
    } else {
      const raw = localStorage.getItem(STORAGE_KEY);
      records = raw ? JSON.parse(raw) : [];
    }
  }catch(e){
    records = [];
  }
}
async function saveRecords(){
  try{
    if(cloudEnabled && docRef){
      await docRef.set({records, updatedAt: Date.now()});
    } else if(window.storage){
      await window.storage.set(STORAGE_KEY, JSON.stringify(records), false);
    } else {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }
  }catch(e){
    console.error('Gagal menyimpan data', e);
    showToast('Gagal menyimpan data secara otomatis. Unduh backup secara berkala.', 'error');
  }
}

/* ---------- Toast ---------- */
function showToast(message, type='success'){
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 250);
  }, 3000);
}

/* ---------- Backup / Restore ---------- */
function handleExport(){
  if(records.length === 0){
    showToast('Belum ada data untuk dibackup.', 'error');
    return;
  }
  const blob = new Blob([JSON.stringify(records, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `backup-mitra-kerjasama-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup berhasil diunduh.', 'success');
}

function handleImportFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (evt) => {
    try{
      const imported = JSON.parse(evt.target.result);
      if(!Array.isArray(imported)) throw new Error('format tidak valid');
      const ok = confirm(`Impor ${imported.length} data dan GANTI seluruh data yang ada saat ini?`);
      if(!ok) return;
      records = imported;
      await saveRecords();
      renderApp();
      showToast(`Berhasil mengimpor ${imported.length} data.`, 'success');
    }catch(err){
      showToast('Gagal mengimpor file. Pastikan file backup valid.', 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ---------- Render: shell ---------- */
function renderApp(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <header>
      <div>
        <div class="eyebrow">Manajemen Kerjasama Instansi</div>
        <h1>Dashboard Mitra & Kunjungan Kerjasama</h1>
        <div class="sub">CV. ADIM'S TRANS — pantau kunjungan, status kerjasama, dan tren mitra secara real-time</div>
      </div>
      <div class="header-actions">
        <button class="btn-ghost" id="btnExport" type="button">${ICON.download} Backup</button>
        <label class="btn-ghost" for="importFile">${ICON.upload} Impor</label>
        <input type="file" id="importFile" accept="application/json" hidden>
        <div class="live-tag"><span class="dot ${cloudEnabled ? '' : 'local'}" id="liveDot"></span> ${cloudEnabled ? 'Cloud Sync Aktif' : 'Penyimpanan Lokal'}</div>
      </div>
    </header>

    <div class="stats" id="statsRow"></div>

    <div class="grid">
      <div class="panel">
        <h2>Tambah Kunjungan <span class="tag">Form</span></h2>
        <form id="addForm">
          <label for="instansi">Nama Instansi</label>
          <input type="text" id="instansi" placeholder="Contoh: Pemkab Brebes / PT Maju Jaya / Hotel Grand Dian" required>

          <label for="tanggal">Tanggal Kunjungan</label>
          <input type="date" id="tanggal" required>

          <label for="jenis">Jenis Kerjasama</label>
          <select id="jenis">
            ${JENIS_OPTIONS.map(j => `<option value="${j}">${j}</option>`).join('')}
          </select>

          <label for="status">Status</label>
          <select id="status">
            <option value="Aktif">Aktif</option>
            <option value="Proses" selected>Proses</option>
            <option value="Selesai">Selesai</option>
          </select>

          <label for="catatan">Catatan</label>
          <textarea id="catatan" placeholder="Catatan tambahan (opsional)"></textarea>

          <button type="submit" class="btn-add">${ICON.plus} Tambah Data Kunjungan</button>
          <div class="form-msg" id="formMsg"></div>
        </form>
      </div>

      <div class="panel">
        <h2>Grafik Kunjungan
          <div class="pill-group">
            <button class="pill-btn active" id="modeInstansi" type="button">Per Instansi</button>
            <button class="pill-btn" id="modeBulan" type="button">Per Bulan</button>
          </div>
        </h2>
        <div class="chart-box" id="chartBox"><canvas id="chartCanvas"></canvas></div>
      </div>
    </div>

    <div class="panel">
      <h2>Daftar Mitra <span class="tag" id="countTag">${records.length} kunjungan</span></h2>
      <div class="table-toolbar">
        <div class="search-wrap">
          ${ICON.search}
          <input type="text" id="searchInput" placeholder="Cari nama instansi...">
        </div>
        <div class="pill-group" id="filterChips">
          <button class="pill-btn active" data-filter="semua" type="button">Semua</button>
          <button class="pill-btn" data-filter="Aktif" type="button">Aktif</button>
          <button class="pill-btn" data-filter="Proses" type="button">Proses</button>
          <button class="pill-btn" data-filter="Selesai" type="button">Selesai</button>
        </div>
      </div>
      <div id="tableBox"></div>
    </div>
  `;

  document.getElementById('addForm').addEventListener('submit', handleAdd);
  document.getElementById('modeInstansi').addEventListener('click', () => switchMode('instansi'));
  document.getElementById('modeBulan').addEventListener('click', () => switchMode('bulan'));
  document.getElementById('btnExport').addEventListener('click', handleExport);
  document.getElementById('importFile').addEventListener('change', handleImportFile);
  document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value.toLowerCase(); renderTable(); });
  document.querySelectorAll('#filterChips .pill-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      statusFilter = btn.dataset.filter;
      document.querySelectorAll('#filterChips .pill-btn').forEach(b => b.classList.toggle('active', b === btn));
      renderTable();
    });
  });

  renderStats();
  renderTable();
  renderChart();
}

/* ---------- Stats with count-up animation ---------- */
function animateValue(el, start, end, duration=550){
  if(!el) return;
  if(start === end){ el.textContent = end; return; }
  const startTime = performance.now();
  function step(now){
    const progress = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(start + (end - start) * eased);
    if(progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function renderStats(){
  const total = records.length;
  const mitra = new Set(records.map(r => r.instansi.trim().toLowerCase())).size;
  const aktif = records.filter(r => r.status === 'Aktif').length;
  const proses = records.filter(r => r.status === 'Proses').length;
  const selesai = records.filter(r => r.status === 'Selesai').length;
  const next = {mitra, total, aktif, proses, selesai};

  const cards = [
    {key:'mitra', label:'Total Mitra', icon: ICON.building, cls:'mitra'},
    {key:'total', label:'Total Kunjungan', icon: ICON.calendar, cls:'kunjungan'},
    {key:'aktif', label:'Status Aktif', icon: ICON.check, cls:'aktif'},
    {key:'proses', label:'Status Proses', icon: ICON.clock, cls:'proses'},
    {key:'selesai', label:'Status Selesai', icon: ICON.archive, cls:'selesai'},
  ];

  document.getElementById('statsRow').innerHTML = cards.map(c => `
    <div class="stat-card ${c.cls}">
      <div class="stat-icon">${c.icon}</div>
      <div class="stat-label">${c.label}</div>
      <div class="stat-value" id="stat-${c.key}">${prevStatValues[c.key]}</div>
    </div>
  `).join('');

  cards.forEach(c => animateValue(document.getElementById(`stat-${c.key}`), prevStatValues[c.key], next[c.key]));
  prevStatValues = next;
}

/* ---------- Table ---------- */
function getFilteredRecords(){
  return records
    .filter(r => statusFilter === 'semua' || r.status === statusFilter)
    .filter(r => !searchQuery || r.instansi.toLowerCase().includes(searchQuery))
    .sort((a,b) => new Date(b.tanggal) - new Date(a.tanggal));
}

function renderTable(){
  const box = document.getElementById('tableBox');
  const countTag = document.getElementById('countTag');
  const filtered = getFilteredRecords();
  if(countTag) countTag.textContent = `${records.length} kunjungan`;

  if(records.length === 0){
    box.innerHTML = `<div class="empty-state">${ICON.inbox}<div>Belum ada data kunjungan. Tambahkan data pertama lewat form di samping.</div></div>`;
    return;
  }
  if(filtered.length === 0){
    box.innerHTML = `<div class="empty-state">${ICON.search}<div>Tidak ada data yang cocok dengan pencarian/filter.</div></div>`;
    return;
  }

  box.innerHTML = `
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>No</th><th>Nama Instansi</th><th>Tanggal Kunjungan</th><th>Jenis Kerjasama</th><th>Status</th><th>Catatan</th><th>Aksi</th>
          </tr>
        </thead>
        <tbody>
          ${filtered.map((r, i) => `
            <tr>
              <td>${i + 1}</td>
              <td class="inst-cell">${escapeHtml(r.instansi)}</td>
              <td>${fmtDate(r.tanggal)}</td>
              <td>${escapeHtml(r.jenis)}</td>
              <td><span class="badge ${r.status.toLowerCase()}">${r.status}</span></td>
              <td class="note-cell">${r.catatan ? escapeHtml(r.catatan) : '-'}</td>
              <td><button class="btn-del" data-id="${r.id}" type="button">${ICON.trash} Hapus</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  box.querySelectorAll('.btn-del').forEach(btn => {
    btn.addEventListener('click', () => handleDelete(btn.dataset.id));
  });
}

/* ---------- Chart ---------- */
function aggregateByInstansi(){
  const map = {};
  records.forEach(r => { map[r.instansi] = (map[r.instansi] || 0) + 1; });
  const entries = Object.entries(map).sort((a,b) => b[1] - a[1]).slice(0, 10);
  return {labels: entries.map(e => e[0]), data: entries.map(e => e[1])};
}
function aggregateByBulan(){
  const map = {};
  records.forEach(r => {
    const key = monthLabel(r.tanggal);
    map[key] = map[key] || {count: 0, sortKey: r.tanggal.slice(0,7)};
    map[key].count += 1;
  });
  const entries = Object.entries(map).sort((a,b) => a[1].sortKey.localeCompare(b[1].sortKey));
  return {labels: entries.map(e => e[0]), data: entries.map(e => e[1].count)};
}

function renderChart(){
  const chartBox = document.getElementById('chartBox');
  if(records.length === 0){
    chartBox.innerHTML = `<div class="chart-empty">${ICON.inbox}<div>Belum ada data untuk ditampilkan</div></div>`;
    if(chartInstance){ chartInstance.destroy(); chartInstance = null; }
    return;
  }
  if(!document.getElementById('chartCanvas')){
    chartBox.innerHTML = `<canvas id="chartCanvas"></canvas>`;
  }
  const agg = chartMode === 'instansi' ? aggregateByInstansi() : aggregateByBulan();
  const ctx = document.getElementById('chartCanvas').getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 0, 260);
  gradient.addColorStop(0, '#d8a755');
  gradient.addColorStop(1, '#9c763c');

  if(chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: agg.labels,
      datasets: [{
        label: 'Jumlah Kunjungan',
        data: agg.data,
        backgroundColor: gradient,
        borderRadius: 7,
        maxBarThickness: 38
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 500, easing: 'easeOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1b232d', borderColor: '#262f3b', borderWidth: 1,
          titleFont: {family:'Plus Jakarta Sans', size: 12}, bodyFont: {family:'Inter', size: 12}, padding: 10
        }
      },
      scales: {
        x: { ticks: { color: '#8b96a3', font: {family:'Inter', size: 11} }, grid: { display: false } },
        y: { beginAtZero: true, ticks: { color: '#8b96a3', stepSize: 1, font: {family:'JetBrains Mono', size: 11} }, grid: { color: '#1f2733' } }
      }
    }
  });
}

function pulseLive(){
  const dot = document.getElementById('liveDot');
  if(!dot) return;
  dot.classList.remove('pulse');
  void dot.offsetWidth;
  dot.classList.add('pulse');
}
function switchMode(mode){
  chartMode = mode;
  document.getElementById('modeInstansi').classList.toggle('active', mode === 'instansi');
  document.getElementById('modeBulan').classList.toggle('active', mode === 'bulan');
  renderChart();
}

/* ---------- CRUD ---------- */
async function handleAdd(e){
  e.preventDefault();
  const instansi = document.getElementById('instansi').value.trim();
  const tanggal = document.getElementById('tanggal').value;
  const jenis = document.getElementById('jenis').value;
  const status = document.getElementById('status').value;
  const catatan = document.getElementById('catatan').value.trim();
  const msg = document.getElementById('formMsg');

  if(!instansi || !tanggal){
    msg.textContent = 'Nama instansi dan tanggal wajib diisi.';
    return;
  }

  records.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    instansi, tanggal, jenis, status, catatan
  });

  await saveRecords();
  renderApp();
  pulseLive();
  showToast('Data kunjungan berhasil ditambahkan.', 'success');
}

async function handleDelete(id){
  const rec = records.find(r => r.id === id);
  if(rec && !confirm(`Hapus data kunjungan "${rec.instansi}"?`)) return;
  records = records.filter(r => r.id !== id);
  await saveRecords();
  renderApp();
  pulseLive();
  showToast('Data kunjungan dihapus.', 'success');
}

(async function init(){
  if(cloudEnabled){
    const ok = initCloudSync(() => renderApp());
    if(!ok){
      await loadRecords();
      renderApp();
    }
  } else {
    await loadRecords();
    renderApp();
  }
})();
</script>
